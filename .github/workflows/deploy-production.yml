name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: "Deployment operation"
        required: true
        default: "direct-deploy"
        type: choice
        options:
          - direct-deploy
          - cleanup-theme-junk
      dry_run:
        description: "Preview changes without changing production"
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_MODE: ${{ github.event_name == 'push' && 'direct-deploy' || inputs.mode }}
      DEPLOY_DRY_RUN: ${{ github.event_name == 'push' && 'false' || inputs.dry_run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        if: ${{ env.DEPLOY_MODE == 'direct-deploy' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: ${{ env.DEPLOY_MODE == 'direct-deploy' }}
        run: npm ci

      - name: Build theme
        if: ${{ env.DEPLOY_MODE == 'direct-deploy' }}
        run: npm run build

      - name: Prepare SSH
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -eu
          test -n "$PROD_HOST"
          test -n "$PROD_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${PROD_PORT:-22}" "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Deploy directly to production theme directory
        if: ${{ env.DEPLOY_MODE == 'direct-deploy' }}
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_PATH: ${{ secrets.PROD_PATH }}
          DRY_RUN: ${{ env.DEPLOY_DRY_RUN }}
        run: |
          set -eu
          test -n "$PROD_HOST"
          test -n "$PROD_USER"
          test -n "$PROD_PATH"
          PROD_PATH="${PROD_PATH%/}"

          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${PROD_PORT:-22} -o IdentitiesOnly=yes"
          REMOTE="$PROD_USER@$PROD_HOST"

          q() { printf '%q' "$1"; }
          if [ "$DRY_RUN" = "true" ]; then
            $SSH_CMD "$REMOTE" "PROD_PATH=$(q "$PROD_PATH") bash -s" <<'REMOTE_PREP_DRYRUN'
          set -eu
          if [ -L "$PROD_PATH" ]; then
            echo "Dry run: would convert production theme symlink to regular directory: $PROD_PATH"
          else
            echo "Dry run: production theme path is already a regular directory or will be created: $PROD_PATH"
          fi
          REMOTE_PREP_DRYRUN
          else
            $SSH_CMD "$REMOTE" "PROD_PATH=$(q "$PROD_PATH") bash -s" <<'REMOTE_PREP'
          set -eu
          if [ -L "$PROD_PATH" ]; then
            rm "$PROD_PATH"
            mkdir -p "$PROD_PATH"
            echo "Converted production theme symlink to regular directory: $PROD_PATH"
          else
            mkdir -p "$PROD_PATH"
          fi
          REMOTE_PREP
          fi

          RSYNC_FLAGS="-az"
          if [ "$DRY_RUN" = "true" ]; then
            RSYNC_FLAGS="$RSYNC_FLAGS --dry-run --itemize-changes"
          fi

          rsync $RSYNC_FLAGS \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='*.local' \
            -e "$SSH_CMD" \
            ./ "$REMOTE:$PROD_PATH/"

      - name: Clean old deploy theme folders
        if: ${{ env.DEPLOY_MODE == 'cleanup-theme-junk' }}
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_PATH: ${{ secrets.PROD_PATH }}
          DRY_RUN: ${{ env.DEPLOY_DRY_RUN }}
        run: |
          set -eu
          test -n "$PROD_HOST"
          test -n "$PROD_USER"
          test -n "$PROD_PATH"
          PROD_PATH="${PROD_PATH%/}"

          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${PROD_PORT:-22} -o IdentitiesOnly=yes"
          REMOTE="$PROD_USER@$PROD_HOST"

          q() { printf '%q' "$1"; }
          $SSH_CMD "$REMOTE" "PROD_PATH=$(q "$PROD_PATH") DRY_RUN=$(q "$DRY_RUN") bash -s" <<'REMOTE_CLEAN'
          set -eu
          THEME_NAME="$(basename "$PROD_PATH")"
          PARENT_DIR="$(dirname "$PROD_PATH")"
          found=0

          for path in \
            "$PARENT_DIR"/${THEME_NAME}_backup_* \
            "$PARENT_DIR"/${THEME_NAME}_pre_releases_backup_* \
            "$PARENT_DIR"/${THEME_NAME}_failed_* \
            "$PARENT_DIR"/${THEME_NAME}_failed_release_link_* \
            "$PARENT_DIR"/${THEME_NAME}_failed_healthcheck_* \
            "$PARENT_DIR"/${THEME_NAME}_releases \
            "$PARENT_DIR/.${THEME_NAME}_last_backup"; do
            if [ ! -e "$path" ] && [ ! -L "$path" ]; then
              continue
            fi
            found=$((found + 1))
            if [ "$DRY_RUN" = "true" ]; then
              echo "Dry run: would delete $(basename "$path")"
            else
              rm -rf -- "$path"
              echo "Deleted deploy-created theme junk: $(basename "$path")"
            fi
          done

          if [ "$found" -eq 0 ]; then
            echo "No deploy-created theme junk found."
          fi
          REMOTE_CLEAN

      - name: Health check
        if: ${{ env.DEPLOY_MODE == 'direct-deploy' && env.DEPLOY_DRY_RUN != 'true' }}
        env:
          PROD_HEALTHCHECK_URL: ${{ secrets.PROD_HEALTHCHECK_URL }}
        run: |
          set -eu
          if [ -z "$PROD_HEALTHCHECK_URL" ]; then
            echo "PROD_HEALTHCHECK_URL is not set. Skipping health check."
            exit 0
          fi

          curl -fsS --retry 3 --retry-delay 5 "$PROD_HEALTHCHECK_URL" > /dev/null
          echo "Health check passed: $PROD_HEALTHCHECK_URL"
